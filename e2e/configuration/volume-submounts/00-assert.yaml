apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 60
collectors:
  - type: pod
    pod: subpath-pod
    tail: 20
commands:
  - script: |
      set -e
      kubectl exec subpath-pod -n $NAMESPACE -- test -f /etc/app/app.conf
      kubectl exec subpath-pod -n $NAMESPACE -- test -f /etc/app/db.conf
      kubectl exec subpath-pod -n $NAMESPACE -- test -f /etc/app/logging.conf
      file_count=$(kubectl exec subpath-pod -n $NAMESPACE -- ls /etc/app/ | wc -l)
      if [ "$file_count" -ne 3 ]; then
        echo "ERROR: expected exactly 3 files in /etc/app/, found $file_count"
        exit 1
      fi
      echo "Confirmed: only subPath files present, no extra files"
---
apiVersion: v1
kind: Pod
metadata:
  name: subpath-pod
status:
  phase: Running
