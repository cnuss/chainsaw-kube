apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  greeting: hello-from-configmap
  config.txt: |
    key1=value1
    key2=value2
---
apiVersion: v1
kind: Pod
metadata:
  name: configmap-reader
spec:
  restartPolicy: Never
  containers:
    - name: reader
      image: busybox:1.37
      command: ["sh", "-c"]
      args:
        - |
          set -e

          # Verify mount point exists and is a directory
          test -d /config || { echo "FAIL: /config is not a directory"; exit 1; }

          # Verify no unexpected files in the mount
          expected=2
          actual=$(ls /config | wc -l)
          test "$actual" -eq "$expected" || { echo "FAIL: expected $expected files, found $actual: $(ls /config)"; exit 1; }

          # Verify exact content — not partial, not corrupted
          test "$(cat /config/greeting)" = "hello-from-configmap"
          grep -qx "key1=value1" /config/config.txt
          grep -qx "key2=value2" /config/config.txt

          # Verify configmap mount is read-only by default
          if touch /config/should-not-exist 2>/dev/null; then
            echo "FAIL: configmap mount is writable — should be read-only"
            rm -f /config/should-not-exist
            exit 1
          fi

          # Verify env var injection matches the mounted file
          test "$GREETING" = "hello-from-configmap"
          test "$GREETING" = "$(cat /config/greeting)" || { echo "FAIL: env var and mount disagree"; exit 1; }

          echo "All configmap checks passed"
      env:
        - name: GREETING
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: greeting
      volumeMounts:
        - name: config-volume
          mountPath: /config
  volumes:
    - name: config-volume
      configMap:
        name: app-config
