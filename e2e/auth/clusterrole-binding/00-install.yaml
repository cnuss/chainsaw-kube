apiVersion: v1
kind: ServiceAccount
metadata:
  name: ns-lister
---
apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |
      set -e
      cat <<EOF | kubectl apply -f -
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRole
      metadata:
        name: ns-lister-role-$NAMESPACE
      rules:
        - apiGroups: [""]
          resources: ["namespaces"]
          verbs: ["get", "list"]
      EOF
  - script: |
      set -e
      cat <<EOF | kubectl apply -f -
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: ns-lister-binding-$NAMESPACE
      subjects:
        - kind: ServiceAccount
          name: ns-lister
          namespace: $NAMESPACE
      roleRef:
        kind: ClusterRole
        name: ns-lister-role-$NAMESPACE
        apiGroup: rbac.authorization.k8s.io
      EOF
