# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: crd-lifecycle
spec:
  steps:
  - name: step-00
    try:
    - apply:
        file: 00-install.yaml
    - assert:
        timeout: 30s
        resource:
          apiVersion: apiextensions.k8s.io/v1
          kind: CustomResourceDefinition
          metadata:
            name: testwidgets.conformance.chainsaw.dev
          status:
            acceptedNames:
              kind: TestWidget
    catch:
    - events: {}
  - name: step-01
    try:
    - apply:
        file: 01-create-cr.yaml
    - assert:
        file: 01-assert.yaml
    catch:
    - events: {}
  - name: step-02
    try:
    - apply:
        file: 02-update-cr.yaml
    - assert:
        file: 02-assert.yaml
    catch:
    - events: {}
  - name: step-03
    try:
    - delete:
        ref:
          apiVersion: conformance.chainsaw.dev/v1
          kind: TestWidget
          name: my-widget
    - script:
        content: kubectl wait --for=delete testwidgets.conformance.chainsaw.dev/my-widget -n $NAMESPACE --timeout=30s
    - script:
        content: kubectl delete crd testwidgets.conformance.chainsaw.dev --ignore-not-found
    cleanup:
    - script:
        content: kubectl delete crd testwidgets.conformance.chainsaw.dev --ignore-not-found
