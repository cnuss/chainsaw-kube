apiVersion: v1
kind: Pod
metadata:
  name: prestop-hook
  labels:
    app: prestop-hook
spec:
  terminationGracePeriodSeconds: 30
  containers:
    - name: busybox
      image: busybox:1.37
      command: ["sh", "-c", "sleep 3600"]
      lifecycle:
        preStop:
          exec:
            command: ["sh", "-c", "touch /tmp/prestop-ran && sleep 5"]
