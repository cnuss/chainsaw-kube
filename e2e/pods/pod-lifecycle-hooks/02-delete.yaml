apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |
      set -e
      kubectl delete pod prestop-hook -n $NAMESPACE --wait=false
      sleep 2
      ts=$(kubectl get pod prestop-hook -n $NAMESPACE -o jsonpath='{.metadata.deletionTimestamp}')
      test -n "$ts"
      echo "preStop hook is running: pod has deletionTimestamp=$ts but is not yet gone"
