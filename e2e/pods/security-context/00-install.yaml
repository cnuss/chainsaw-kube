apiVersion: v1
kind: Pod
metadata:
  name: sc-user-group
spec:
  restartPolicy: Never
  securityContext:
    runAsUser: 1000
    runAsGroup: 3000
  containers:
    - name: test
      image: busybox:1.37
      command: ["sh", "-c"]
      args:
        - |
          set -e
          test "$(id -u)" = "1000"
          test "$(id -g)" = "3000"
