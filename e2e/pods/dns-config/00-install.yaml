apiVersion: v1
kind: Pod
metadata:
  name: dns-custom
  labels:
    app: dns-custom
spec:
  containers:
    - name: busybox
      image: busybox:1.37
      command: ["sh", "-c", "sleep 3600"]
  dnsConfig:
    nameservers:
      - 8.8.8.8
    searches:
      - custom.search.domain
    options:
      - name: ndots
        value: "3"
      - name: timeout
        value: "2"
---
apiVersion: v1
kind: Pod
metadata:
  name: dns-none
  labels:
    app: dns-none
spec:
  containers:
    - name: busybox
      image: busybox:1.37
      command: ["sh", "-c", "sleep 3600"]
  dnsPolicy: None
  dnsConfig:
    nameservers:
      - 1.1.1.1
      - 8.8.4.4
    searches:
      - manual.search.local
    options:
      - name: ndots
        value: "5"
