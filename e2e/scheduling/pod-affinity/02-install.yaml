apiVersion: v1
kind: Pod
metadata:
  name: anti-affinity-pod
  labels:
    app: anti-affinity-pod
spec:
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - target
            topologyKey: kubernetes.io/hostname
  containers:
    - name: nginx
      image: nginx:1.27
