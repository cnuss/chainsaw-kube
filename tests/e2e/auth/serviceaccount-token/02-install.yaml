apiVersion: v1
kind: Pod
metadata:
  name: pod-projected-token
spec:
  serviceAccountName: sa-with-token
  automountServiceAccountToken: false
  containers:
    - name: busybox
      image: busybox:1.37
      command: ["sh", "-c", "sleep 3600"]
      volumeMounts:
        - name: projected-token
          mountPath: /var/run/secrets/custom
          readOnly: true
  volumes:
    - name: projected-token
      projected:
        sources:
          - serviceAccountToken:
              path: custom-token
              audience: api.example.com
              expirationSeconds: 3600
