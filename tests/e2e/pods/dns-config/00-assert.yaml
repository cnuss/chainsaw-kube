apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 60
collectors:
  - type: pod
    pod: dns-custom
    tail: 20
  - type: pod
    pod: dns-none
    tail: 20
commands:
  - script: |
      set -e
      resolv=$(kubectl exec dns-custom -n $NAMESPACE -- cat /etc/resolv.conf)
      echo "$resolv" | grep -q "8.8.8.8"
      echo "$resolv" | grep -q "custom.search.domain"
      echo "$resolv" | grep -q "ndots:3"
      echo "$resolv" | grep -q "timeout:2"
  - script: |
      set -e
      resolv=$(kubectl exec dns-none -n $NAMESPACE -- cat /etc/resolv.conf)
      echo "$resolv" | grep -q "1.1.1.1"
      echo "$resolv" | grep -q "8.8.4.4"
      echo "$resolv" | grep -q "manual.search.local"
      echo "$resolv" | grep -q "ndots:5"
---
apiVersion: v1
kind: Pod
metadata:
  name: dns-custom
status:
  phase: Running
---
apiVersion: v1
kind: Pod
metadata:
  name: dns-none
status:
  phase: Running
