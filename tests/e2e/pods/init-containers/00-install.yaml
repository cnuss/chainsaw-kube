apiVersion: v1
kind: Pod
metadata:
  name: init-single
  labels:
    app: init-single
spec:
  initContainers:
    - name: init-writer
      image: busybox:1.37
      command: ["sh", "-c", "echo hello-from-init > /work/init-message"]
      volumeMounts:
        - name: shared
          mountPath: /work
  containers:
    - name: main
      image: busybox:1.37
      command: ["sh", "-c", "sleep 3600"]
      volumeMounts:
        - name: shared
          mountPath: /work
  volumes:
    - name: shared
      emptyDir: {}
---
apiVersion: v1
kind: Pod
metadata:
  name: init-multi
  labels:
    app: init-multi
spec:
  initContainers:
    - name: init-1
      image: busybox:1.37
      command: ["sh", "-c", "echo content-from-init-1 > /work/file-1"]
      volumeMounts:
        - name: shared
          mountPath: /work
    - name: init-2
      image: busybox:1.37
      command: ["sh", "-c", "echo content-from-init-2 > /work/file-2"]
      volumeMounts:
        - name: shared
          mountPath: /work
  containers:
    - name: main
      image: busybox:1.37
      command: ["sh", "-c", "sleep 3600"]
      volumeMounts:
        - name: shared
          mountPath: /work
  volumes:
    - name: shared
      emptyDir: {}
