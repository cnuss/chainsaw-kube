apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 60
collectors:
  - type: pod
    pod: resource-set
    tail: 20
commands:
  - script: |
      set -e
      req_cpu=$(kubectl get pod resource-set -n $NAMESPACE -o jsonpath='{.spec.containers[0].resources.requests.cpu}')
      test "$req_cpu" = "50m"
      req_mem=$(kubectl get pod resource-set -n $NAMESPACE -o jsonpath='{.spec.containers[0].resources.requests.memory}')
      test "$req_mem" = "32Mi"
      lim_cpu=$(kubectl get pod resource-set -n $NAMESPACE -o jsonpath='{.spec.containers[0].resources.limits.cpu}')
      test "$lim_cpu" = "100m"
      lim_mem=$(kubectl get pod resource-set -n $NAMESPACE -o jsonpath='{.spec.containers[0].resources.limits.memory}')
      test "$lim_mem" = "64Mi"
  - script: |
      set -e
      phase=$(kubectl get pod resource-excessive -n $NAMESPACE -o jsonpath='{.status.phase}')
      test "$phase" = "Pending"
---
apiVersion: v1
kind: Pod
metadata:
  name: resource-set
status:
  phase: Running
---
apiVersion: v1
kind: Pod
metadata:
  name: resource-excessive
status:
  phase: Pending
