apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 60
collectors:
  - type: pod
    pod: sc-user-group
    tail: 20
commands:
  - script: |
      set -e
      uid=$(kubectl exec sc-user-group -n $NAMESPACE -- id -u)
      test "$uid" = "1000"
  - script: |
      set -e
      gid=$(kubectl exec sc-user-group -n $NAMESPACE -- id -g)
      test "$gid" = "3000"
  - script: |
      set -e
      kubectl exec sc-user-group -n $NAMESPACE -- touch /data/testfile
      group=$(kubectl exec sc-user-group -n $NAMESPACE -- stat -c %g /data/testfile)
      test "$group" = "2000"
---
apiVersion: v1
kind: Pod
metadata:
  name: sc-user-group
status:
  phase: Running
