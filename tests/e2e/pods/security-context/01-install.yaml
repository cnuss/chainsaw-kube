apiVersion: v1
kind: Pod
metadata:
  name: sc-readonly-root
  labels:
    app: sc-readonly-root
spec:
  containers:
    - name: busybox
      image: busybox:1.37
      command: ["sh", "-c", "sleep 3600"]
      securityContext:
        readOnlyRootFilesystem: true
      volumeMounts:
        - name: writable
          mountPath: /tmp/writable
  volumes:
    - name: writable
      emptyDir: {}
