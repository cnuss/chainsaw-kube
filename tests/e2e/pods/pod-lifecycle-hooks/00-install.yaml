apiVersion: v1
kind: Pod
metadata:
  name: poststart-hook
  labels:
    app: poststart-hook
spec:
  containers:
    - name: busybox
      image: busybox:1.37
      command: ["sh", "-c", "sleep 3600"]
      lifecycle:
        postStart:
          exec:
            command: ["sh", "-c", "touch /tmp/poststart-done"]
