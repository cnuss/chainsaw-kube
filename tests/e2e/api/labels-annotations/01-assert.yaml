apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 30
commands:
  - script: |
      set -e
      # Verify new label was added
      version=$(kubectl get pod labeled-pod -n $NAMESPACE -o jsonpath='{.metadata.labels.version}')
      test "$version" = "v1"
      # Verify original labels still present
      app=$(kubectl get pod labeled-pod -n $NAMESPACE -o jsonpath='{.metadata.labels.app}')
      test "$app" = "labeled-pod"
      # Verify new annotation was added
      notes=$(kubectl get pod labeled-pod -n $NAMESPACE -o jsonpath='{.metadata.annotations.release-notes}')
      test "$notes" = "initial release"
      # Verify original annotations still present
      owner=$(kubectl get pod labeled-pod -n $NAMESPACE -o jsonpath='{.metadata.annotations.owner}')
      test "$owner" = "kuttl-conformance"
