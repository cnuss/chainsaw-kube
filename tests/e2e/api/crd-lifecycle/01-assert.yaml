apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 30
commands:
  - script: |
      set -e
      msg=$(kubectl get testwidget my-widget -n $NAMESPACE -o jsonpath='{.spec.message}')
      test "$msg" = "hello-from-widget"
      reps=$(kubectl get testwidget my-widget -n $NAMESPACE -o jsonpath='{.spec.replicas}')
      test "$reps" = "3"
---
apiVersion: conformance.kuttl.dev/v1
kind: TestWidget
metadata:
  name: my-widget
spec:
  message: hello-from-widget
  replicas: 3
