apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  greeting: hello-from-configmap
  config.txt: |
    key1=value1
    key2=value2
---
apiVersion: v1
kind: Pod
metadata:
  name: configmap-reader
spec:
  restartPolicy: Never
  containers:
    - name: reader
      image: busybox:1.37
      command: ["sh", "-c"]
      args:
        - |
          set -e
          echo "Checking env var..."
          test "$GREETING" = "hello-from-configmap"
          echo "Checking mounted file..."
          grep -q "key1=value1" /config/config.txt
          grep -q "key2=value2" /config/config.txt
          echo "All checks passed"
      env:
        - name: GREETING
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: greeting
      volumeMounts:
        - name: config-volume
          mountPath: /config
  volumes:
    - name: config-volume
      configMap:
        name: app-config
