apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: test-priority
value: 1000
globalDefault: false
description: Test priority class for e2e validation
---
apiVersion: v1
kind: Pod
metadata:
  name: priority-pod
  labels:
    app: priority-pod
spec:
  priorityClassName: test-priority
  containers:
    - name: nginx
      image: nginx:1.27
