apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 60
commands:
  - script: |
      set -e
      # Verify ordered pod names (stable identity)
      kubectl get pod web-0 -n $NAMESPACE -o jsonpath='{.metadata.name}' | grep -q "web-0"
      kubectl get pod web-1 -n $NAMESPACE -o jsonpath='{.metadata.name}' | grep -q "web-1"
      kubectl get pod web-2 -n $NAMESPACE -o jsonpath='{.metadata.name}' | grep -q "web-2"
  - script: |
      set -e
      # Verify headless service DNS records exist
      svc_ip=$(kubectl get svc nginx-headless -n $NAMESPACE -o jsonpath='{.spec.clusterIP}')
      test "$svc_ip" = "None"
