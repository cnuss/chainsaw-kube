apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 120
collectors:
  - type: pod
    selector: app=nginx-recreate
    tail: 20
  - type: events
commands:
  - script: |
      set -e
      # Verify all pods are running the new image
      pods=$(kubectl get pods -n $NAMESPACE -l app=nginx-recreate -o jsonpath='{.items[*].spec.containers[0].image}')
      for img in $pods; do
        test "$img" = "nginx:1.27-alpine"
      done
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-recreate
status:
  readyReplicas: 3
  updatedReplicas: 3
