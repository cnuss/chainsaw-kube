apiVersion: v1
kind: ServiceAccount
metadata:
  name: smoke-sa
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: smoke-role
rules:
  - apiGroups: [""]
    resources: ["pods", "configmaps"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: smoke-binding
subjects:
  - kind: ServiceAccount
    name: smoke-sa
roleRef:
  kind: Role
  name: smoke-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: smoke-config
data:
  app.conf: "smoke-config-value"
  greeting: "hello-from-smoke"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: smoke-httpd-conf
data:
  httpd.conf: |
    ServerRoot "/usr/local/apache2"
    Listen 8080
    LoadModule mpm_event_module modules/mod_mpm_event.so
    LoadModule unixd_module modules/mod_unixd.so
    LoadModule authz_core_module modules/mod_authz_core.so
    LoadModule log_config_module modules/mod_log_config.so
    LoadModule mime_module modules/mod_mime.so
    LoadModule dir_module modules/mod_dir.so
    User daemon
    Group daemon
    ServerName localhost
    DocumentRoot "/mnt"
    <Directory />
        Require all denied
    </Directory>
    <Directory "/mnt">
        Require all granted
    </Directory>
    DirectoryIndex index.html
    TypesConfig conf/mime.types
    LogFormat "response:%>s" smoke
    CustomLog /proc/self/fd/1 smoke
    ErrorLog /proc/self/fd/2
---
apiVersion: v1
kind: Secret
metadata:
  name: smoke-secret
type: Opaque
stringData:
  password: "s3cret-smoke"
  token: "fake-token-value"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: smoke-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 64Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smoke-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smoke-deploy
  template:
    metadata:
      labels:
        app: smoke-deploy
    spec:
      serviceAccountName: smoke-sa
      initContainers:
        - name: kubectl-auth-whoami
          image: registry.k8s.io/kubectl:v1.35.0
          command: ["kubectl", "auth", "whoami"]
        - name: kubectl-auth-can-i-list-pods
          image: registry.k8s.io/kubectl:v1.35.0
          command: ["kubectl", "auth", "can-i", "list", "pods"]
        - name: kubectl-auth-can-i-list-configmaps
          image: registry.k8s.io/kubectl:v1.35.0
          command: ["kubectl", "auth", "can-i", "list", "configmaps"]
        - name: kubectl-auth-can-i-list-secrets
          image: registry.k8s.io/kubectl:v1.35.0
          command: ["kubectl", "auth", "can-i", "list", "secrets"]
        - name: touch-empty-dir-init
          image: busybox:latest
          command: ["touch", "/mnt/empty-dir/init"]
          volumeMounts:
            - name: empty-dir
              mountPath: /mnt/empty-dir
        - name: touch-host-path-init
          image: busybox:latest
          command: ["touch", "/mnt/host-path/init"]
          volumeMounts:
            - name: host-path
              mountPath: /mnt/host-path
        - name: test-security-context
          image: busybox:latest
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 2000
          command: ["sh", "-c"]
          args:
            - |
              set -e
              test "$(id -u)" = "1000"
              test "$(id -g)" = "2000"
              ! mkdir /mnt/root 2>/dev/null || { echo "unexpected write access to /mnt"; exit 1; }
          volumeMounts:
            - name: host-path
              mountPath: /mnt/host-path
        - name: touch-mnt-pvc-init
          image: busybox:latest
          command: ["touch", "/mnt/pvc/init"]
          volumeMounts:
            - name: pvc
              mountPath: /mnt/pvc
      containers:
        - name: assert
          image: busybox:latest
          command: ["sh", "-c"]
          args:
            - |
              while true; do
                rm /mnt/pvc/ok 2>/dev/null || true
                sleep 1

                echo "<env>"
                env
                echo "</env>"

                echo "<mnt>"
                ls -alR /mnt
                echo "</mnt>"

                test -d /mnt/pvc || { echo "PVC volume missing"; continue; }

                test -d /mnt/config-map || { echo "configMap volume missing"; continue; }
                test -f /mnt/config-map/app.conf || { echo "configMap data missing"; continue; }
                test -f /mnt/config-map/greeting || { echo "configMap greeting missing"; continue; }
                grep -q "smoke-config-value" /mnt/config-map/app.conf || { echo "configMap app.conf content mismatch"; continue; }
                grep -q "hello-from-smoke" /mnt/config-map/greeting || { echo "configMap greeting content mismatch"; continue; }

                test -d /mnt/secret || { echo "secret volume missing"; continue; }
                test -f /mnt/secret/password || { echo "secret password missing"; continue; }
                test -f /mnt/secret/token || { echo "secret token missing"; continue; }
                grep -q "s3cret-smoke" /mnt/secret/password || { echo "secret password content mismatch"; continue; }
                grep -q "fake-token-value" /mnt/secret/token || { echo "secret token content mismatch"; continue; }

                ! touch /mnt/config-map/rogue 2>/dev/null || { echo "configMap is writable"; continue; }
                ! sh -c 'echo x > /mnt/secret/password' 2>/dev/null || { echo "secret is writable"; continue; }

                test -d /mnt/downward-api || { echo "downwardAPI volume missing"; continue; }
                grep -q 'app="smoke-deploy"' /mnt/downward-api/labels || { echo "downwardAPI labels missing app"; continue; }
                grep -q 'smoke-deploy' /mnt/downward-api/annotations 2>/dev/null; true

                test -d /mnt/projected || { echo "projected volume missing"; continue; }
                test -s /mnt/projected/sa-token || { echo "projected SA token empty"; continue; }
                grep -q "smoke-config-value" /mnt/projected/app.conf || { echo "projected configMap mismatch"; continue; }
                grep -q 'app="smoke-deploy"' /mnt/projected/labels || { echo "projected labels missing app"; continue; }

                test -f /mnt/empty-dir/init || { echo "emptyDir init file missing"; continue; }
                test -f /mnt/host-path/init || { echo "hostPath init file missing"; continue; }

                test -f /mnt/pvc/init || { echo "PVC init file missing"; continue; }
                test -f /mnt/pvc/assert-poststart || { echo "PVC postStart file missing"; continue; }
                test -f /mnt/pvc/httpd-poststart || { echo "PVC httpd postStart file missing"; continue; }

                test -n "$POD_NAME" || { echo "POD_NAME not set"; continue; }
                test -n "$POD_NAMESPACE" || { echo "POD_NAMESPACE not set"; continue; }
                test "$CONFIG_GREETING" = "hello-from-smoke" || { echo "CONFIG_GREETING mismatch"; continue; }
                test "$SECRET_PASSWORD" = "s3cret-smoke" || { echo "SECRET_PASSWORD mismatch"; continue; }

                echo "all checks passed, creating /mnt/pvc/ok"
                touch /mnt/pvc/ok
                sleep infinity
              done
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CONFIG_GREETING
              valueFrom:
                configMapKeyRef:
                  name: smoke-config
                  key: greeting
            - name: SECRET_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smoke-secret
                  key: password
          volumeMounts:
            - name: empty-dir
              mountPath: /mnt/empty-dir
            - name: host-path
              mountPath: /mnt/host-path
            - name: pvc
              mountPath: /mnt/pvc
            - name: config-map
              mountPath: /mnt/config-map
            - name: secret
              mountPath: /mnt/secret
            - name: downward-api
              mountPath: /mnt/downward-api
            - name: projected
              mountPath: /mnt/projected
          lifecycle:
            postStart:
              exec:
                command: ["touch", "/mnt/pvc/assert-poststart"]
            preStop:
              exec:
                command: ["touch", "/mnt/pvc/assert-prestop"]
        - name: httpd
          image: httpd:latest
          command: ["httpd", "-DFOREGROUND"]
          ports:
            - containerPort: 8080
              hostPort: 8080
          lifecycle:
            postStart:
              exec:
                command: ["touch", "/mnt/pvc/httpd-poststart"]
            preStop:
              exec:
                command: ["touch", "/mnt/pvc/httpd-prestop"]
          startupProbe:
            exec:
              command: ["test", "-f", "/mnt/pvc/assert-poststart"]
            initialDelaySeconds: 1
            periodSeconds: 2
            failureThreshold: 10
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 3
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /pvc/ok
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 10
          volumeMounts:
            - name: pvc
              mountPath: /mnt/pvc
            - name: httpd-conf
              mountPath: /usr/local/apache2/conf/httpd.conf
              subPath: httpd.conf
      volumes:
        - name: httpd-conf
          configMap:
            name: smoke-httpd-conf
        - name: empty-dir
          emptyDir: {}
        - name: host-path
          hostPath:
            path: /tmp/host-path
            type: DirectoryOrCreate
        - name: config-map
          configMap:
            name: smoke-config
        - name: secret
          secret:
            secretName: smoke-secret
        - name: downward-api
          downwardAPI:
            items:
              - path: labels
                fieldRef:
                  fieldPath: metadata.labels
              - path: annotations
                fieldRef:
                  fieldPath: metadata.annotations
        - name: projected
          projected:
            sources:
              - serviceAccountToken:
                  path: sa-token
                  expirationSeconds: 3600
              - configMap:
                  name: smoke-config
                  items:
                    - key: app.conf
                      path: app.conf
              - downwardAPI:
                  items:
                    - path: labels
                      fieldRef:
                        fieldPath: metadata.labels
        - name: pvc
          persistentVolumeClaim:
            claimName: smoke-pvc
