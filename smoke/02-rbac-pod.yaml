apiVersion: v1
kind: Pod
metadata:
  name: smoke-rbac
spec:
  serviceAccountName: smoke-sa
  restartPolicy: Never
  containers:
    - name: verifier
      # bitnami/kubectl only publishes :latest (no versioned tags)
      # official registry.k8s.io/kubectl is distroless (no shell)
      image: bitnami/kubectl:latest
      command: ["sh", "-c"]
      args:
        - |
          set -e

          echo "=== RBAC: test allowed actions ==="
          echo "Listing pods (should succeed)..."
          kubectl get pods --namespace=$POD_NAMESPACE
          echo "Allowed: list pods PASS"

          echo "Listing configmaps (should succeed)..."
          kubectl get configmaps --namespace=$POD_NAMESPACE
          echo "Allowed: list configmaps PASS"

          echo "Listing secrets (should succeed - list verb granted)..."
          kubectl get secrets --namespace=$POD_NAMESPACE
          echo "Allowed: list secrets PASS"

          echo "=== RBAC: test denied actions ==="
          echo "Deleting pod (should be denied)..."
          if kubectl delete pod smoke-pod --namespace=$POD_NAMESPACE 2>/dev/null; then
            echo "ERROR: should not be able to delete pods"
            exit 1
          fi
          echo "Denied: delete pods PASS"

          echo "Creating configmap (should be denied)..."
          if kubectl create configmap forbidden-cm --from-literal=key=val --namespace=$POD_NAMESPACE 2>/dev/null; then
            echo "ERROR: should not be able to create configmaps"
            exit 1
          fi
          echo "Denied: create configmaps PASS"

          echo "ALL RBAC CHECKS PASSED"
      env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
