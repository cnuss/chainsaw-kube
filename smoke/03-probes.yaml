apiVersion: v1
kind: Pod
metadata:
  name: probe-exec
  labels:
    app: probe-exec
spec:
  terminationGracePeriodSeconds: 3
  containers:
    - name: busybox
      image: busybox:1.37
      command: ["sh", "-c", "touch /tmp/healthy && sleep 3600"]
      readinessProbe:
        exec:
          command: ["test", "-f", "/tmp/healthy"]
        initialDelaySeconds: 1
        periodSeconds: 2
      livenessProbe:
        exec:
          command: ["test", "-f", "/tmp/healthy"]
        initialDelaySeconds: 1
        periodSeconds: 5
---
apiVersion: v1
kind: Pod
metadata:
  name: probe-http
  labels:
    app: probe-http
spec:
  terminationGracePeriodSeconds: 3
  containers:
    - name: nginx
      image: nginx:1.27
      ports:
        - containerPort: 80
      readinessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 2
        periodSeconds: 3
      startupProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 1
        periodSeconds: 2
        failureThreshold: 10
---
apiVersion: v1
kind: Pod
metadata:
  name: probe-tcp
  labels:
    app: probe-tcp
spec:
  terminationGracePeriodSeconds: 3
  containers:
    - name: nginx
      image: nginx:1.27
      ports:
        - containerPort: 80
      readinessProbe:
        tcpSocket:
          port: 80
        initialDelaySeconds: 2
        periodSeconds: 3
      livenessProbe:
        tcpSocket:
          port: 80
        initialDelaySeconds: 5
        periodSeconds: 10
