name: Conformance Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── discover test groups and suites ───────────────────────────────
  matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5

      - id: gen
        run: eval make matrix

  # ── run each group/suite in parallel ──────────────────────────────
  test:
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.matrix.outputs.matrix) }}
    name: ${{ matrix.provider }} ${{ matrix.group }}${{ matrix.suite && '/' }}${{ matrix.suite }}
    steps:
      - uses: actions/checkout@v5

      - uses: kyverno/action-install-chainsaw@v0.2.14

      - if: matrix.provider == 'minikube'
        uses: medyagh/setup-minikube@latest
        with:
          kubernetes-version: v1.36.0

      - if: matrix.provider == 'k3s'
        run: |
          curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION=v1.36.0+k3s1 sh -s - --write-kubeconfig-mode=644
          mkdir -p "$HOME/.kube"
          sudo cp /etc/rancher/k3s/k3s.yaml "$HOME/.kube/config"
          sudo chown "$(id -u):$(id -g)" "$HOME/.kube/config"
          kubectl wait --for=condition=Ready node --all --timeout=90s

      - if: matrix.provider == 'nanokube'
        uses: cnuss/nanokube@1.36

      - name: Run ${{ matrix.group }}${{ matrix.suite && '/' }}${{ matrix.suite }}
        run: make test GROUP=${{ matrix.group }} SUITE=${{ matrix.suite }} KIND=false

      - name: Export nanokube logs
        if: failure() && matrix.provider == 'nanokube'
        run: nanokube export logs cluster-logs-ci

      - name: Export minikube logs
        if: failure() && matrix.provider == 'minikube'
        run: |
          mkdir -p cluster-logs-ci
          minikube logs --file=cluster-logs-ci/minikube.log

      - name: Export k3s logs
        if: failure() && matrix.provider == 'k3s'
        run: |
          mkdir -p cluster-logs-ci
          sudo journalctl -u k3s --no-pager > cluster-logs-ci/k3s.log

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.provider }}-${{ matrix.group }}-${{ matrix.suite || 'default' }}
          path: cluster-logs-ci/
          retention-days: 7
