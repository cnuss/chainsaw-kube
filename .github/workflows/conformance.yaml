name: Conformance Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── discover test groups and suites ───────────────────────────────
  matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5

      - id: gen
        run: eval make matrix

  # ── run each group/suite in parallel ──────────────────────────────
  test:
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.matrix.outputs.matrix) }}
    name: ${{ matrix.provider }} ${{ matrix.group }}${{ matrix.suite && '/' }}${{ matrix.suite }}
    steps:
      - uses: actions/checkout@v5

      - uses: kyverno/action-install-chainsaw@v0.2.14

      - if: matrix.provider == 'kind'
        uses: helm/kind-action@v1.12.0

      - if: matrix.provider == 'nanokube'
        uses: cnuss/nanokube@dbd0fa349aebaa46e95128f80a9e26ac07f6380f # v1.36.0

      - name: Run ${{ matrix.group }}${{ matrix.suite && '/' }}${{ matrix.suite }}
        run: make test GROUP=${{ matrix.group }} SUITE=${{ matrix.suite }} KIND=false

      - name: Export KIND logs
        if: failure() && matrix.provider == 'kind'
        run: kind export logs kind-logs-ci --name chart-testing

      - name: Upload KIND logs
        if: failure() && matrix.provider == 'kind'
        uses: actions/upload-artifact@v4
        with:
          name: kind-logs-${{ matrix.group }}-${{ matrix.suite || 'default' }}
          path: kind-logs-ci/
          retention-days: 7
